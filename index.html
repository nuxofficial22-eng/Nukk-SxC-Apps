.hamburger{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);

  width:42px;
  height:42px;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:5px;

  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(12px);

  border-radius:14px;
  border:1px solid rgba(255,255,255,0.4);

  box-shadow:
    0 8px 20px rgba(0,0,0,0.08),
    inset 0 1px 0 rgba(255,255,255,0.6);

  cursor:pointer;
  z-index:200;

  transition:0.3s cubic-bezier(.4,0,.2,1);
}


.hamburger:hover{
  transform:translateY(-50%) scale(1.06);
  box-shadow:
    0 12px 25px rgba(0,0,0,0.15),
    inset 0 1px 0 rgba(255,255,255,0.6);
}


.hamburger span{
  display:block;
  height:2.5px;
  width:18px;
  background:#dc2626;
  border-radius:10px;
  transition:0.4s cubic-bezier(.4,0,.2,1);
}


.hamburger.active span:nth-child(1){
  transform:translateY(7px) rotate(45deg);
}

.hamburger.active span:nth-child(2){
  opacity:0;
  transform:scale(0);
}

.hamburger.active span:nth-child(3){
  transform:translateY(-7px) rotate(-45deg);
}

}


.menu.active{

@keyframes bounce{
  0%,100%{ transform: translateY(0); }
  50%{ transform: translateY(6px); }
}

.container{
  padding:15px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;

  margin-top:10px; 
}

body::after{
  content:"";
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:60px;

  background:linear-gradient(to top, #eef4ff, transparent);
  pointer-events:none;
}

.scroll-hint{
  will-change: opacity, transform;
  text-align:center;
  font-size:13px;
  color:#dc2626;
  margin:10px 0;

  animation: bounce 1.5s infinite;

  opacity:1;
  transform:translateY(0);

  transition:
    opacity 1s cubic-bezier(.22,1,.36,1),
    transform 1s cubic-bezier(.22,1,.36,1);
}


#loading-screen{
  position:fixed;
  inset:0;
  background:#eef4ff;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;

.loader{
  width:50px;
  height:50px;
  border:4px solid rgba(220,38,38,0.2);
  border-top:4px solid #dc2626;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-bottom:15px;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}


.loading-text{

  opacity:0;
  pointer-events:none;

  transition:0.4s ease;
  z-index:90;
}

#blurOverlay.show{
  opacity:1;
  pointer-events:auto;
}

/* 🔥 IKLAN */
.ads-box{
  position:fixed;

  left:50%;
  transform:translate(-50%,-60%) scale(0.9);

  width:90%;
  max-width:340px;

  background:white;
  border-radius:20px;
  overflow:hidden;

  box-shadow:0 20px 60px rgba(0,0,0,0.3);
  z-index:100;

  opacity:0;
  pointer-events:none;

  transition: all 0.4s cubic-bezier(.22,1,.36,1);
}

/* 🔥 AKTIF */
.ads-box.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
  pointer-events:auto;
}

.ads-box img{
  width:100%;

/* isi */
.ads-content{

}

.ads-title{
  font-weight:600;

}

}

.ads-desc{

  margin-top:5px;
}

/* tombol */
.ads-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;

  margin-top:10px;
  background:linear-gradient(135deg,black,red);

  padding:10px;
  border-radius:12px;
  text-decoration:none;
  font-size:13px;
  font-weight:500;

  transition:0.25s;
}

/* ukuran svg */
.ads-btn svg{
  width:15px;
  height:15px;
}

/* efek hover */
.ads-btn:hover{
  transform:translateY(-2px) scale(1.03);
  box-shadow:0 8px 20px rgba(37,211,102,0.5);
}

/* tombol X */
.ads-close{
  position:absolute;
  top:8px;
  right:8px;
  width:28px;
  height:28px;
  background:rgba(0,0,0,0.6);
  color:white;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* animasi */
@keyframes fadeIn{
  from{
    opacity:0;
    transform:translate(-50%,-60%);
  }
  to{
    opacity:1;
    transform:translate(-50%,-50%);
  }
}

.card.premium{
  border:1px solid red;
  box-shadow:0 0 20px rgba(239,68,68,0.4);
}

function revealOnScroll(){
  const reveals = document.querySelectorAll(".reveal")

  reveals.forEach(el=>{
    const windowHeight = window.innerHeight
    const elementTop = el.getBoundingClientRect().top
    const visiblePoint = 100

    if(elementTop < windowHeight - visiblePoint){
      el.classList.add("active")
    }
  })
}
